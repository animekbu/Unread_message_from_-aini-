<!doctype html>
<html lang="id" class="h-full">

  <style>
    * { font-family: 'Noto Sans', sans-serif; }
    
    @keyframes bootFlicker {
      0%, 100% { opacity: 0; }
      10% { opacity: 0.1; }
      20% { opacity: 0.3; }
      40% { opacity: 0.2; }
      60% { opacity: 0.5; }
      80% { opacity: 0.4; }
      100% { opacity: 1; }
    }
    
    @keyframes glitch {
      0% { transform: translate(0); filter: hue-rotate(0deg); }
      10% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
      20% { transform: translate(2px, -2px); filter: hue-rotate(180deg); }
      30% { transform: translate(-2px, -2px); filter: hue-rotate(270deg); }
      40% { transform: translate(2px, 2px); filter: hue-rotate(0deg); }
      50% { transform: translate(0); }
      100% { transform: translate(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }
    
    .boot-flicker { animation: bootFlicker 3s ease-out forwards; }
    .glitch-effect { animation: glitch 0.5s ease-in-out; }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .slide-up { animation: slideUp 0.4s ease-out forwards; }
    .pulse-anim { animation: pulse 2s infinite; }
    
    .phone-frame {
      background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
      box-shadow: 
        0 0 0 3px #2d2d44,
        0 0 0 6px #1a1a2e,
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }
    
    .screen-glow {
      box-shadow: 
        inset 0 0 30px rgba(59, 130, 246, 0.1),
        0 0 20px rgba(59, 130, 246, 0.05);
    }
    
    .app-icon {
      transition: all 0.2s ease;
    }
    .app-icon:hover:not(.locked) {
      transform: scale(1.1);
    }
    .app-icon.locked {
      filter: grayscale(1) brightness(0.5);
      cursor: not-allowed;
    }
    
    .chat-bubble {
      max-width: 80%;
      word-wrap: break-word;
    }
    
    .deleted-msg {
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 2px,
        rgba(255,255,255,0.03) 4px
      );
    }
    
    .notification-badge {
      animation: pulse 1.5s infinite;
    }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    
    .choice-btn {
      transition: all 0.3s ease;
    }
    .choice-btn:hover {
      transform: translateX(5px);
      background: rgba(59, 130, 246, 0.3);
    }
    
    .memory-overlay {
      background: radial-gradient(ellipse at center, rgba(255,200,150,0.1) 0%, transparent 70%);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>

    // ==================== RENDER FUNCTIONS ====================
    
    function renderBootScreen() {
      const content = document.getElementById('screen-content');
      content.innerHTML = `
        <div class="w-full h-full bg-black flex flex-col items-center justify-center boot-flicker">
          <div class="text-6xl mb-4">📱</div>

      `;
      
      setTimeout(() => renderLockScreen(), 3000);
    }
    
    function renderLockScreen() {
      gameState.currentScene = 'lockscreen';
      const content = document.getElementById('screen-content');
      const isGoodEnding = gameState.ending === 'good';
      
      content.innerHTML = `
        <div class="w-full h-full bg-gradient-to-b from-slate-900 via-slate-800 to-slate-900 flex flex-col items-center pt-12 fade-in relative overflow-hidden">
          <!-- Background Stars -->

          <!-- Time -->

          <!-- Notification -->

            <div class="flex items-center gap-3">
              <div class="text-2xl">${isGoodEnding ? '💒' : '📅'}</div>
              <div class="flex-1">
                <div class="text-white text-sm font-medium">Calendar</div>
                <div class="text-slate-300 text-xs">${isGoodEnding ? 'Pernikahan kita ❤️' : 'Hari ini harusnya 1 tahun kita…'}</div>
              </div>
              ${!isGoodEnding ? '<div class="text-blue-400 text-xs font-mono notification-badge">01012026</div>' : ''}
            </div>
          </div>
          
          ${isGoodEnding ? `
            <div class="text-center text-slate-300 text-sm px-6 mb-8 fade-in" style="animation-delay: 0.5s;">
              Selamat pagi, suamiku ❤️
            </div>
            <button onclick="renderGoodEndingHome()" class="bg-blue-500 text-white px-8 py-3 rounded-full font-medium slide-up" style="animation-delay: 0.7s;">
              Buka HP
            </button>
          ` : `
            <!-- Passcode -->
            <div class="flex-1 flex flex-col items-center justify-center relative z-20">
              <div class="text-slate-400 text-sm mb-4">Masukkan Passcode</div>
              <div class="flex gap-3 mb-8">
                ${Array(5).fill().map((_, i) => `
                  <div id="dot-${i}" class="w-3 h-3 rounded-full bg-slate-600 transition-all"></div>
                `).join('')}
              </div>
              
              <!-- Numpad Grid -->
              <div id="numpad-grid" class="grid grid-cols-3 gap-4 mb-8">
                ${[1,2,3,4,5,6,7,8,9].map(n => `
                  <button type="button" data-key="${n}" class="numpad-btn w-16 h-16 rounded-full bg-slate-700/50 hover:bg-slate-600 text-white text-xl font-light transition-all active:scale-95 relative z-20">
                    ${n}
                  </button>
                `).join('')}
              </div>
              
              <!-- Bottom row with 0 and delete -->
              <div class="grid grid-cols-3 gap-4 w-full relative z-20">
                <div></div>
                <button type="button" data-key="0" class="numpad-btn w-16 h-16 rounded-full bg-slate-700/50 hover:bg-slate-600 text-white text-xl font-light transition-all active:scale-95">
                  0
                </button>
                <button type="button" data-key="⌫" class="numpad-btn w-16 h-16 rounded-full bg-red-900/50 hover:bg-red-800/50 text-white text-xl font-light transition-all active:scale-95">
                  ⌫
                </button>
              </div>
            </div>
            
            <div class="text-slate-500 text-xs mb-8 text-center px-4">
              💡 Petunjuk: DDMMYYYY (tanggal anniversary kita)
            </div>
          `}
        </div>
      `;
      
      // Attach event listeners to numpad buttons
      if (!isGoodEnding) {
        setTimeout(() => {
          const buttons = document.querySelectorAll('.numpad-btn');
          buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              const key = btn.getAttribute('data-key');
              pressKey(key);
            });
          });
        }, 0);
      }
    }
    
    let currentPasscode = '';
    
    function pressKey(key) {
      if (key === '⌫') {
        currentPasscode = currentPasscode.slice(0, -1);
      } else if (key !== '' && currentPasscode.length < 8) {
        currentPasscode += key;
      }
      updatePasscodeDots();
      if (currentPasscode.length === 6 || currentPasscode.length === 8) {
        setTimeout(() => handlePasscode(currentPasscode), 300);
      }
    }
    
    function updatePasscodeDots() {
      for (let i = 0; i < 5; i++) {
        const dot = document.getElementById(`dot-${i}`);
        if (dot) {
          dot.className = `w-3 h-3 rounded-full transition-all ${i < currentPasscode.length ? 'bg-blue-500' : 'bg-slate-600'}`;
        }
      }
    }
    
    function handlePasscode(value) {
      if (value === '010126' || value === '01012026') {
        currentPasscode = '';
        showTransition('Hmm... mungkin aku bisa ngatur sesuatu dulu...', () => {
          gameState.currentScene = 'home';
          renderHomeScreen();
        });
      } else if (value.length === 6 || value.length === 8) {
        // Wrong passcode shake
        const dots = document.querySelectorAll('[id^="dot-"]');
        dots.forEach(dot => {
          dot.classList.add('bg-red-500');
          dot.style.animation = 'shake 0.5s ease';
        });
        setTimeout(() => {
          currentPasscode = '';
          updatePasscodeDots();
        }, 500);
      }
    }
    
    function showTransition(text, callback, duration = 2000) {
      const content = document.getElementById('screen-content');
      content.innerHTML = `
        <div class="w-full h-full bg-black flex items-center justify-center p-6 fade-in">
          <p class="text-slate-400 text-center text-sm italic">"${text}"</p>
        </div>
      `;
      setTimeout(callback, duration);
    }
    
    function renderHomeScreen() {
      gameState.currentScene = 'home';
      const content = document.getElementById('screen-content');
      
      const apps = [
        { id: 'settings', icon: '⚙️', name: 'Settings', unlocked: true },
        { id: 'calendar', icon: '📅', name: 'Calendar', unlocked: gameState.settingsComplete },
        { id: 'email', icon: '📧', name: 'Email', unlocked: gameState.calendarComplete },
        { id: 'gallery', icon: '🖼️', name: 'Gallery', unlocked: gameState.emailComplete },

        { id: 'chat', icon: '💬', name: 'Chat', unlocked: gameState.voiceNoteComplete },
      ];
      
      content.innerHTML = `

          <div class="absolute inset-0 opacity-10" style="background: url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"white\" stroke-width=\"0.5\"/></svg>') center/cover;"></div>

            <span class="text-white text-sm">23:59</span>
            <div class="flex gap-1">
              <span class="text-white text-xs">📶</span>
              <span class="text-white text-xs">🔋</span>
            </div>
          </div>
          
          <!-- App Grid -->
          <div class="grid grid-cols-3 gap-6 relative z-10">
            ${apps.map((app, i) => `
              <div class="app-icon flex flex-col items-center gap-2 ${app.unlocked ? 'cursor-pointer' : 'locked'} slide-up" 
                   style="animation-delay: ${i * 0.1}s;"
                   onclick="${app.unlocked ? `openApp('${app.id}')` : ''}">
                <div class="w-14 h-14 rounded-2xl bg-slate-800/60 backdrop-blur flex items-center justify-center text-2xl relative ${app.unlocked ? 'shadow-lg' : ''}">
                  ${app.icon}
                  ${!app.unlocked ? '<div class="absolute inset-0 rounded-2xl bg-black/50 flex items-center justify-center">🔒</div>' : ''}
                  ${app.id === 'chat' && app.unlocked ? '<div class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center notification-badge">5</div>' : ''}
                </div>
                <span class="text-white text-xs ${app.unlocked ? '' : 'text-slate-500'}">${app.name}</span>
              </div>
            `).join('')}
          </div>
          
          <!-- Dock -->
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-slate-800/40 backdrop-blur rounded-3xl px-6 py-3">
            <div class="flex gap-6">
              <div class="text-2xl">📞</div>
              <div class="text-2xl">💬</div>
              <div class="text-2xl">📷</div>
            </div>
          </div>
        </div>
      `;
    }
    
    function openApp(appId) {
      switch(appId) {
        case 'settings': renderSettings(); break;
        case 'calendar': renderCalendar(); break;
        case 'email': renderEmail(); break;
        case 'gallery': renderGallery(); break;
        case 'voicenote': renderVoiceNote(); break;
        case 'chat': renderChatList(); break;
      }
    }
    
    function renderSettings() {
      gameState.currentScene = 'settings';
      const content = document.getElementById('screen-content');
      
      content.innerHTML = `
        <div class="w-full h-full bg-slate-900 flex flex-col fade-in">
          <!-- Header -->
          <div class="bg-slate-800 px-4 py-3 flex items-center gap-3 pt-10">
            <button onclick="renderHomeScreen()" class="text-blue-400">← Kembali</button>
            <span class="text-white font-medium flex-1 text-center">Settings</span>

          <!-- Settings List -->

              </div>

            <!-- Brightness -->

              <input type="range" id="brightness-slider" min="0" max="100" value="${gameState.brightnessSet ? 70 : 30}"

                onchange="setBrightness(this.value)">
            </div>
            
            <!-- Ringtone -->

              </div>
              <div class="space-y-2">
                ${['🎵 Default', '🎹 Piano Melody', '🎸 Soft Guitar'].map((rt, i) => `

                `).join('')}

            </div>

          <!-- Complete Button -->

document.addEventListener('click', startMusic, { once: true });

function playClick() {
  const click = document.getElementById('click-sound');
  if (!click) return;
  click.currentTime = 0;
  click.volume = 0.4;
  click.play();
}

document.addEventListener('click', function(e) {
  if (e.target.tagName === 'BUTTON') {
    playClick();
  }
});
</script>

</body>
